name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: windows-2025-vs2026

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "[18.0,19.0)"

      - name: Resolve package version from release tag
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$') {
            throw "Invalid tag format: $tag. Expected v#.#.# or v#.#.#-suffix"
          }
          $version = $tag.Substring(1)
          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build and pack GuiTerminal
        shell: pwsh
        run: |
          .\nuget\pack.ps1 -Version '${{ steps.version.outputs.package_version }}'

      - name: Upload package as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: GuiTerminal.${{ steps.version.outputs.package_version }}
          path: nuget/artifacts/GuiTerminal.${{ steps.version.outputs.package_version }}.nupkg

      - name: Login to NuGet.org
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
    
      - name: Publish package to NuGet.org
        shell: pwsh
        run: |
          dotnet nuget push "nuget/artifacts/GuiTerminal.${{ steps.version.outputs.package_version }}.nupkg" `
            --source https://api.nuget.org/v3/index.json `
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} `
            --skip-duplicate
