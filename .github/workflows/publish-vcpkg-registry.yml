name: Publish Vcpkg Registry

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish-registry:
    runs-on: windows-2025-vs2026
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare release metadata
        id: metadata
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $tagPattern = '^v\d+\.\d+\.\d+(-[a-zA-Z0-9][a-zA-Z0-9.\-]*)?$'
          if ($tag -notmatch $tagPattern) {
            throw "Tag '$tag' does not match the required format: v<major>.<minor>.<patch> or v<major>.<minor>.<patch>-<suffix>."
          }
          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Clone registry repository
        id: clone
        shell: pwsh
        env:
          VCPKG_REGISTRY_PAT: ${{ secrets.VCPKG_REGISTRY_PAT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VCPKG_REGISTRY_PAT)) {
            throw "Missing required secret: VCPKG_REGISTRY_PAT"
          }
          $registryPath = Join-Path $env:RUNNER_TEMP "vcpkg-registry"
          git clone "https://x-access-token:$env:VCPKG_REGISTRY_PAT@github.com/mxmauro/vcpkg-registry.git" $registryPath
          "registry_path=$registryPath" >> $env:GITHUB_OUTPUT

      - name: Generate registry update
        shell: pwsh
        run: |
          .\scripts\build-vcpkg-registry.ps1 `
            -RegistryPath "${{ steps.clone.outputs.registry_path }}" `
            -RegistryKind Git `
            -SourceMode GitHub `
            -Version "${{ steps.metadata.outputs.version }}" `
            -SourceRef "${{ steps.metadata.outputs.tag }}" `
            -GitHubRepository "${{ github.repository }}"

      - name: Commit and push registry update
        shell: pwsh
        env:
          VCPKG_REGISTRY_PAT: ${{ secrets.VCPKG_REGISTRY_PAT }}
        run: |
          $registryPath = "${{ steps.clone.outputs.registry_path }}"
          $status = git -C $registryPath status --porcelain
          if ([string]::IsNullOrWhiteSpace($status)) {
            Write-Output "No registry changes to commit."
            exit 0
          }
          git -C $registryPath config user.name "github-actions[bot]"
          git -C $registryPath config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C $registryPath add ports versions
          git -C $registryPath commit -m "Add guiterminal ${{ steps.metadata.outputs.version }}"
          git -C $registryPath push "https://x-access-token:$env:VCPKG_REGISTRY_PAT@github.com/mxmauro/vcpkg-registry.git" HEAD:main
