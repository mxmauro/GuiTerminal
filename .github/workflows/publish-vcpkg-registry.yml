name: Publish Vcpkg Registry

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish-registry:
    runs-on: windows-2025-vs2026
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare release metadata
        id: metadata
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $tagPattern = '^v\d+\.\d+\.\d+(-[a-zA-Z0-9][a-zA-Z0-9.\-]*)?$'
          if ($tag -notmatch $tagPattern) {
            throw "Tag '$tag' does not match the required format: v<major>.<minor>.<patch> or v<major>.<minor>.<patch>-<suffix>."
          }
          $version = $tag.Substring(1)
          $sanitizedVersion = $version -replace '[^a-zA-Z0-9]', '_'
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "branch_suffix=$sanitizedVersion" >> $env:GITHUB_OUTPUT

      - name: Check out registry repository
        uses: actions/checkout@v6
        with:
          repository: mxmauro/vcpkg-registry
          ref: master
          token: ${{ secrets.VCPKG_REGISTRY_PAT }}
          path: vcpkg-registry

      - name: Generate registry update
        shell: pwsh
        run: |
          .\scripts\build-vcpkg-registry.ps1 `
            -RegistryPath "${{ github.workspace }}\vcpkg-registry" `
            -RegistryKind Git `
            -SourceMode GitHub `
            -Version "${{ steps.metadata.outputs.version }}" `
            -SourceRef "${{ steps.metadata.outputs.tag }}" `
            -GitHubRepository "${{ github.repository }}"

      - name: Create registry pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.VCPKG_REGISTRY_PAT }}
          path: vcpkg-registry
          base: master
          branch: update-guiterminal-${{ steps.metadata.outputs.branch_suffix }}
          delete-branch: true
          commit-message: "Add GuiTerminal ${{ steps.metadata.outputs.version }}"
          title: "Add GuiTerminal ${{ steps.metadata.outputs.version }}"
          body: |
            Automated registry update for `${{ github.repository }}` tag `${{ steps.metadata.outputs.tag }}`.
          add-paths: |
            ports/guiterminal
            versions/baseline.json
            versions/g-/guiterminal.json
